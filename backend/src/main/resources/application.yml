spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:sentinel}
    username: ${POSTGRES_USER:sentinel}
    password: ${POSTGRES_PASSWORD:sentinel_local_2026}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080