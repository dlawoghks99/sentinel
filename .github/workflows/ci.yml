name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Java 21 설정
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle 권한 부여
        working-directory: ./backend
        run: chmod +x gradlew

      - name: Gradle 빌드
        working-directory: ./backend
        run: ./gradlew build -x test

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Node.js 설정
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: 의존성 설치
        working-directory: ./frontend
        run: npm install

      - name: 프론트 빌드
        working-directory: ./frontend
        run: npm run build
      